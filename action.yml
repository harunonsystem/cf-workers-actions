---
name: 'Cloudflare Actions'
description: 'GitHub Actions for Cloudflare Workers'
author: 'harunonsystem'

branding:
  icon: 'cloud'
  color: 'orange'

# This is a composite action that provides access to sub-actions
# Users can access individual actions via:
# - harunonsystem/cloudflare-actions/cleanup@v1

runs:
  using: 'composite'
  steps:
    - name: 'Information'
      shell: bash
      run: |
        echo "🚀 Cloudflare Actions Suite"
        echo "Available actions:"
        echo "  - cleanup: harunonsystem/cloudflare-actions/cleanup@v1"
        echo ""
        echo "📖 Documentation: https://github.com/harunonsystem/cloudflare-actions"
